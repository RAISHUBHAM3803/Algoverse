version: '3.8'

services:
  # 1. Express Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: algoverse_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=15m
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_REFRESH_EXPIRE=7d
      - CLIENT_URL=http://localhost:3000
      - PISTON_URL=http://piston:2000
      - PISTON_API=http://piston:2000/api/v2/execute
      - PISTON_MOCK=false
    depends_on:
      - piston
    networks:
      - algoverse-network

  # 2. Piston Code Execution Sandbox
  piston:
    image: engineerman/piston:latest
    container_name: algoverse_piston
    restart: always
    volumes:
      - piston-data:/piston/packages
    # Exposing internal port 2000 to the backend within the docker network
    networks:
      - algoverse-network

networks:
  algoverse-network:
    driver: bridge

volumes:
  piston-data:
